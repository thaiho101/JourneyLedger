name: Deploy JourneyLedger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: 
      - selft-hosted
      - Linux
      - ARM

    steps:
      - name: Deploy application
        run: |
          echo "Deploy workflow picked up by Pi"
          cd /home/pi/personalDev/JourneyLedger
          ./deploy.sh


# Deploys JourneyLedger from main to Raspberry Pi